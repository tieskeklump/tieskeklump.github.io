<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>klumpenaar.it</title>
  <meta name="description" content="klumpenaar.it — binnenkort online." />
  <style>
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #161b22, var(--bg));
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    main { max-width: 40rem; }
    .badge {
      display: inline-block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, 0.3);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    p { color: var(--muted); font-size: 1.15rem; line-height: 1.6; }
    footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <span class="badge">Binnenkort online</span>
    <h1>klumpenaar.it</h1>
    <p>Website in aanbouw. Kom snel terug.</p>
    <footer>&copy; 2026 klumpenaar.it</footer>
  </main>
</body>
</html>
